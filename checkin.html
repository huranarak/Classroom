<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Check-in | CL303353</title>

    <link rel="stylesheet" href="checkin.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="page">

    <!-- ================= COURSE ================= -->

    <div class="course-box">

        <h2>CL303353</h2>

        <p>การพัฒนาทุนมนุษย์ในศตวรรษที่ 21</p>

    </div>

    <!-- ================= FORM ================= -->

    <div class="form-card">

        <!-- Email -->

        <label>

            Email <span>*</span>

        </label>

        <input
            type="email"
            id="email"
            placeholder="student@kkumail.com"
            required>

        <!-- Name -->

        <label>

            ชื่อ-นามสกุล <span>*</span>

        </label>

        <input
            type="text"
            id="name"
            placeholder="นางสาวโคล่า ซ่าสดชื่น"
            required>

        <!-- Student ID -->

        <label>

            รหัสนักศึกษา <span>*</span>

        </label>

        <input
            type="text"
            id="studentId"
            placeholder="613280xxx-x"
            maxlength="11"
            required>

        <!-- Major -->

<label>

    สาขา <span>*</span>

</label>

<select
    id="major"
    required>

    <option value="">
        เลือกสาขา
    </option>

    <option value="GPA">
        GPA
    </option>

    <option value="FFM">
        FFM
    </option>

    <option value="UMT">
        UMT
    </option>

</select>

        <!-- GPS -->

        <div class="gps">

            <div class="gps-title">

                📍 สถานะตำแหน่ง

            </div>

            <div
                class="gps-status"
                id="gpsStatus">

                🔴 กรุณาอนุญาตการเข้าถึงตำแหน่ง

            </div>

        </div>

    </div>

    <!-- ================= BUTTON ================= -->

    <div class="submit-area">

        <button
            class="submit-btn"
            id="submitBtn">

            บันทึกข้อมูล

        </button>

    </div>

    <!-- ================= FOOTER ================= -->

    <div class="footer">

        By Pichitra K.

    </div>

    </div>

    <!-- ================= POPUP ================= -->

    <div id="popup" class="popup">

        <div class="popup-box">

            <img id="popupImage" src="" alt="Result">

            <h2 id="popupTitle"></h2>

            <p id="popupMessage"></p>

            <button id="popupButton">ตกลง</button>

        </div>

    </div>

    <script src="checkin.js"></script>

</body>

</html>
